spring:
  application:
    name: DreamScapeDemo

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:                   # ⚠️ ← 이건 spring 안쪽에 있어야 함!
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

hailuo:
  base-url: https://pollo.ai/api/platform
  generation-path: /generation/minimax/video-01
  task-status-path: /task/status
  api-key:          # ✅ 여기에 키 연결 (또는 직접 붙여넣기)
  webhook-url: ${HAILUO_WEBHOOK_URL:} # (선택) 웹훅 URL은 비워둬도 됨

server:
  port: 8080

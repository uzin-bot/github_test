
# openai key를 넣기 위한 준비
spring:
  application:
    name: dream-test

openai:
  #api-key:
  model : gpt-4o
  api-url: https://api.openai.com/v1/chat/completions
  temperature: 0.3 # 창의성
  max-tokens: 500
  n: 1 # 답변 1개만


#
  spring:
    datasource:
      url: jdbc:h2:mem:dreamdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

    h2:
      console:
        enabled: true
        path: /h2-console
